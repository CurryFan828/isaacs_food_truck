<div class="checkout-container" [class.open]="visible">
    <h2>Checkout</h2>

    <div *ngFor="let item of cart.items" class="checkout-item">
        <!-- <img [src]="food.imageUrl" alt="{{food.name}}" class="item-image" /> -->
        <div class="item-info">
        <div class="item-name">{{item.food.name}}</div>
        <div class="item-quantity">Items: x{{item.quantity}}</div>
        </div>
    </div>

    <div class="checkout-summary">
        <div>Total Items: {{totalItems}}</div>
        <div>Total Price: ${{totalPrice.toFixed(2)}}</div>
    </div>

    <button *ngIf="!showCardForm" (click)="proceedToPayment()" class="proceed-btn">Proceed with Checkout</button>

    <div *ngIf="showCardForm" class="payment-form">
        <label>
        Card Number:
        <input type="text" [(ngModel)]="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" />
        </label>
        <label>
        Expiry (MM/YY):
        <input type="text" [(ngModel)]="expiry" placeholder="MM/YY" maxlength="5" />
        </label>
        <label>
        CVV:
        <input type="text" [(ngModel)]="cvv" placeholder="123" maxlength="4" />
        </label>
        <button (click)="confirmOrder()" class="confirm-btn">Confirm Order</button>
    </div>
</div>
